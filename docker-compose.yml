services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: asyncjobs
      POSTGRES_USER: asyncjobs
      POSTGRES_PASSWORD: asyncjobs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asyncjobs -d asyncjobs"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/asyncjobs
      DATABASE_USERNAME: asyncjobs
      DATABASE_PASSWORD: asyncjobs
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_MANAGEMENT_URL: http://guest:guest@rabbitmq:15672
      APP_ROLE: api
      API_ENABLED: "true"
      WORKER_ENABLED: "false"
      OUTBOX_DISPATCHER_ENABLED: "false"
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8080"

  worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/asyncjobs
      DATABASE_USERNAME: asyncjobs
      DATABASE_PASSWORD: asyncjobs
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      APP_ROLE: worker
      API_ENABLED: "false"
      WORKER_ENABLED: "true"
      OUTBOX_DISPATCHER_ENABLED: "false"
      WORKER_CONCURRENCY: 4
      DB_POOL_MAX_SIZE: 15
      SPRING_PROFILES_ACTIVE: local
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  dispatcher:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/asyncjobs
      DATABASE_USERNAME: asyncjobs
      DATABASE_PASSWORD: asyncjobs
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      APP_ROLE: dispatcher
      API_ENABLED: "false"
      WORKER_ENABLED: "false"
      OUTBOX_DISPATCHER_ENABLED: "true"
      OUTBOX_POLL_INTERVAL_MS: 500
      SPRING_PROFILES_ACTIVE: local
